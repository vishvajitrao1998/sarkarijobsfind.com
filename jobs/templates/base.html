{% load static %}
<!doctype html>
<html lang="en" style="height: 100%;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Jobs Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet">
    {% block extra_head %}
    {% endblock %}
</head>

<body>

    {% include 'partials/navbar.html' %}
    {% block content %}
    {% endblock %}

    <button class="scroll-top-btn" id="scrollTopBtn" aria-label="Scroll to top"> <i
            data-lucide="chevron-up" style="width: 24px; height: 24px;"></i> </button>
    {% include 'partials/footer.html' %}



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'jobs/js/dark_mode.js' %}"></script>


    {% block extra_scripts %}
    {% endblock %}

    <script>
        lucide.createIcons();
        window.addEventListener('DOMContentLoaded', () => {
            const tables = document.querySelectorAll('table');

            tables.forEach(table => {
                // Add multiple Bootstrap classes to table
                table.classList.add('table', 'table-striped', 'table-bordered', 'table-hover');

                // Create wrapper
                const wrapper = document.createElement('div');
                wrapper.classList.add('table-responsive');

                // Insert wrapper and move table inside it
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);
            });
        });

    </script>

</body>

</html>
