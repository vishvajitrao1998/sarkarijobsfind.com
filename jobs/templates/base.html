{% load static %}
<!doctype html>
<html lang="en" style="height: 100%;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'jobs/images/SarkariJobsFind.com.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet">

    
    {% block extra_head %}
    {% endblock %}
    <style>
        .whatsapp-btn {
            position: fixed;

            right: 20px;
            bottom: 20px;

            background: #25D366;
            color: #fff;

            padding: 14px 26px;

            border-radius: 50px;

            display: flex;
            align-items: center;
            gap: 12px;

            text-decoration: none;

            font-size: 20px;
            font-weight: 700;

            z-index: 9999;

            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);

            transition: all 0.3s ease;
        }

        .whatsapp-btn i {
            font-size: 28px;
        }

        .whatsapp-btn:hover {
            transform: scale(1.05);
            color: #fff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        /* Mobile Responsive */
        @media(max-width:576px) {

            .whatsapp-btn {
                padding: 12px 20px;
                font-size: 18px;
            }

            .whatsapp-btn i {
                font-size: 24px;
            }

        }
    </style>
</head>

<body>

    {% include 'partials/navbar.html' %}
    {% block content %}
    {% endblock %}

    <!-- WhatsApp Floating Button -->
    <!-- <a href="https://wa.me/919999999999" class="whatsapp-float" target="_blank">
        <i class="bi bi-whatsapp"></i>
    </a> -->


    <a href="https://whatsapp.com/channel/0029VbCgR39HltYEK2ShZK3X" target="_blank" rel="noopener noreferrer"
        class="whatsapp-btn d-flex align-items-center justify-content-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-whatsapp"
            viewBox="0 0 16 16">
            <path
                d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232" />

        <span>WhatsApp</span>
    </a>
    {% include 'partials/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'jobs/js/dark_mode.js' %}"></script>
    {% block extra_scripts %}
    {% endblock %}

    <script>
        lucide.createIcons();
        window.addEventListener('DOMContentLoaded', () => {
            const tables = document.querySelectorAll('table');

            tables.forEach(table => {
                // Add multiple Bootstrap classes to table
                table.classList.add('table', 'table-striped', 'table-bordered');

                // Create wrapper
                const wrapper = document.createElement('div');
                wrapper.classList.add('table-responsive');

                // Insert wrapper and move table inside it
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);

                // Optional: make width auto
                table.style.width = '100%';
            });
        });

    </script>

</body>

</html>
